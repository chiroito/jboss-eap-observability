# モニタリング
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: my-coo-monitoring
spec:
  type: Monitoring
  monitoring:
    perses:
      enabled: true
    clusterHealthAnalyzer:
      enabled: true
---


# トラブルシューティング
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: my-coo-troubleshooting-panel
spec:
  type: TroubleshootingPanel
---


# ログデータを読む
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: logging
spec:
  type: Logging
  logging:
    lokiStack:
      name: my-coo-logging-loki
      namespace: openshift-logging
    logsLimit: 1000
    timeout: 30s
    schema: viaq
---


# トレーシングを見る
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: my-coo-distributed-tracing
spec:
  type: DistributedTracing
