# ストレージが必要なので、MinIO必須
---
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: hello-tempo-monolithic
  namespace: observability-coo-demo
spec:
  ingestion:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true
  jaegerui:
    enabled: true
    resources:
      limits:
        cpu: '1'
        memory: 1Gi
    route:
      enabled: true
      termination: insecure
  multitenancy:
    authentication:
      - tenantId: hello-app-tenant
        tenantName: hello-app-tenant
    enabled: true
    mode: openshift
  resources:
    limits:
      cpu: '1'
      memory: 1Gi
  storage:
    traces:
      backend: memory
  timeout: 0s
---

apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: my-otel-instrumentation
  namespace: observability-coo-demo
spec:
  env:
    - name: OTEL_SERVICE_NAME
      value: hello-app
  exporter:
    endpoint: 'http://my-coo-otel-collector.observability-coo-demo.svc.cluster.local:4317'
---

# OTel Collector
kind: OpenTelemetryCollector
apiVersion: opentelemetry.io/v1beta1
metadata:
  name: my-otel
  namespace: observability-coo-demo
spec:
  networkPolicy:
    enabled: true
  observability:
    metrics: {}
  deploymentUpdateStrategy: {}
  config:
    exporters:
      otlp/tempo:
        auth:
          authenticator: bearertokenauth
        endpoint: 'https://tempo-hello-tempo-monolithic-gateway.observability-coo-demo.svc.cluster.local:4317'
        headers:
          X-Scope-OrgID: hello-app-tenant
        tls:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
          insecure: false
    extensions:
      bearertokenauth:
        filename: /var/run/secrets/kubernetes.io/serviceaccount/token
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: '0.0.0.0:4317'
          http:
            endpoint: '0.0.0.0:4318'
    service:
      extensions:
        - bearertokenauth
      pipelines:
        traces:
          exporters:
            - otlp/tempo
          processors:
            - batch
          receivers:
            - otlp
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
  mode: deployment
  resources: {}
  podDnsConfig: {}
  managementState: managed
  upgradeStrategy: automatic
  ingress:
    route: {}
  serviceAccount: my-trace-sa
  daemonSetUpdateStrategy: {}
  targetAllocator:
    allocationStrategy: consistent-hashing
    collectorNotReadyGracePeriod: 30s
    collectorTargetReloadInterval: 30s
    filterStrategy: relabel-config
    observability:
      metrics: {}
    prometheusCR:
      scrapeInterval: 30s
    resources: {}
  replicas: 1
  ipFamilyPolicy: SingleStack
  configVersions: 3
---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-trace-sa
  namespace: observability-coo-demo
---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: my-tempo-traces-write
rules:
  - apiGroups:
      - tempo.grafana.com
    resources:
      - hello-app-tenant
    resourceNames:
      - traces
    verbs:
      - create
---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: my-tempo-traces-write
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: my-tempo-traces-write
subjects:
  - kind: ServiceAccount
    name: my-trace-sa
    namespace: observability-coo-demo
---

