apiVersion: v1
kind: Namespace
metadata:
  name: observability-demo


# *********************************************************************************
# アプリケーションのビルド
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: hello-app-image
  namespace: observability-demo
---
kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: hello-app-build-config
  namespace: observability-demo
spec:
  output:
    to:
      kind: ImageStreamTag
      name: hello-app-image:latest
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  source:
    type: Git
    git:
      uri: https://github.com/chiroito/jboss-eap-observability


# *********************************************************************************
### トレーシング
# 先に Instrumentation を作らないといけない
---
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: hello-tempo-monolithic
  namespace: observability-demo
spec:
  ingestion:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true
  resources:
    limits:
      cpu: '1'
      memory: 1Gi
  jaegerui:
    resources:
      limits:
        cpu: '1'
        memory: 1Gi
    route:
      enabled: true
      termination: insecure
    enabled: true
  storage:
    traces:
      backend: memory
---
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: my-otel-instrumentation
  namespace: observability-demo
spec:
  env:
    - name: OTEL_SERVICE_NAME
      value: hello-app
  exporter:
    endpoint: 'http://my-otel-collector.observability-demo.svc.cluster.local:4317'

# *********************************************************************************
# アプリケーション
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: observability-demo
  name: hello-app
  labels:
    app: hello-app
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"hello-app-image:latest","namespace":"observability-demo"},"fieldPath":"spec.template.spec.containers[?(@.name==\"container\")].image","paused":true}]
spec:
  selector:
    matchLabels:
      app: hello-app
  replicas: 1
  template:
    metadata:
      labels:
        app: hello-app
        app.kubernetes.io/name: hello-app
        cryostat.io/name: my-cryostat
        cryostat.io/namespace: observability-demo
        cryostat.io/java-options-var: MODULE_OPTS
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9990"
        instrumentation.opentelemetry.io/inject-java: "true"
        sidecar.opentelemetry.io/inject: "true"
    spec:
      containers:
        - name: container
          image: >-
            image-registry.openshift-image-registry.svc:5000/observability-demo/hello-app-image
          ports:
            - name: web
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 9990
              protocol: TCP
            - name: cryostat
              containerPort: 9977
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9990
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9990
          startupProbe:
            httpGet:
              path: /health/started
              port: 9990
          env:
            - name: JAVA_OPTS
              value: '-Xlog:gc*:stdout:time,uptimemillis,level -Djboss.bind.address.management=0.0.0.0'
      imagePullSecrets: []
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  paused: false
---
apiVersion: v1
kind: Service
metadata:
  name: hello-app-service
  namespace: observability-demo
  labels:
    app: hello-app
spec:
  selector:
    app: hello-app
  ports:
    - protocol: TCP
      name: web
      port: 8080
      targetPort: 8080
    - protocol: TCP
      name: management
      port: 9990
      targetPort: 9990
    - protocol: TCP
      name: cryostat
      port: 9977
      targetPort: 9977
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: hello-app-route
  namespace: observability-demo
  annotations:
    openshift.io/host.generated: 'true'
spec:
  host: hello-app.apps.o.chiroito.dev
  path: /
  to:
    kind: Service
    name: hello-app-service
    weight: 100
  port:
    targetPort: web
  tls:
    termination: edge
  wildcardPolicy: None
---


# *********************************************************************************
# OTel Collector
---
kind: OpenTelemetryCollector
apiVersion: opentelemetry.io/v1beta1
metadata:
  name: my-otel
  namespace: observability-demo
spec:
  mode: deployment
  config:
    exporters:
      debug: {}
      otlp/tempo:
        endpoint: 'tempo-hello-tempo-monolithic.observability-demo.svc.cluster.local:4317'
        tls:
          insecure: true
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    service:
      pipelines:
        traces:
          exporters:
            - otlp/tempo
          processors:
            - batch
          receivers:
            - otlp

# *********************************************************************************
# メトリクス収集
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-config
  namespace: openshift-monitoring
data:
  config.yaml: |
    enableUserWorkload: true
---

# *********************************************************************************
# JFR
apiVersion: operator.cryostat.io/v1beta2
kind: Cryostat
metadata:
  name: my-cryostat
  namespace: observability-demo
spec:
  enableCertManager: false
  agentOptions:
    allowInsecure: true
    disableHostnameVerification: true
---

# *********************************************************************************
# MinIO
apiVersion: v1
kind: Secret
metadata:
  name: my-minio-secret
  namespace: observability-demo
type: Opaque
stringData:
  rootUser: minio
  rootPassword: minio123456
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-minio-pvc
  namespace: observability-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-minio
  namespace: observability-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-minio
  template:
    metadata:
      labels:
        app: my-minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: my-minio-secret
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-minio-secret
                  key: rootPassword
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: my-minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: my-minio
  namespace: observability-demo
spec:
  selector:
    app: my-minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: batch/v1
kind: Job
metadata:
  name: my-minio-init
  namespace: observability-demo
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: my-minio-secret
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-minio-secret
                  key: rootPassword
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export MC_HOST_local="http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@my-minio.observability-demo.svc:9000"
              until mc ls local >/dev/null 2>&1; do
                sleep 2
              done
              mc mb -p local/my-loki || true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: my-minio-secret
  namespace: openshift-logging
type: Opaque
stringData:
  bucketnames: my-loki
  endpoint: http://my-minio.observability-demo.svc:9000
  access_key_id: minio
  access_key_secret: minio123456
  forcepathstyle: "true"
---

# *********************************************************************************
# Lokiの設定
apiVersion: loki.grafana.com/v1
kind: LokiStack
metadata:
  name: my-logging-loki
  namespace: openshift-logging
spec:
  managementState: Managed
  size: 1x.demo
  storageClassName: hostpath-csi
  storage:
    schemas:
      - effectiveDate: "2026-04-01"
        version: v13
    secret:
      name: my-minio-secret
      type: s3
  tenants:
    mode: openshift-logging
  limits:
    global:
      retention:
        days: 1
---


# *********************************************************************************
# ログデータを収集する
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-log-collector-sa
  namespace: openshift-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: my-log-collector-collect-application-logs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-application-logs
subjects:
  - kind: ServiceAccount
    name: my-log-collector-sa
    namespace: openshift-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: my-log-collector-write-logs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: logging-collector-logs-writer
subjects:
  - kind: ServiceAccount
    name: my-log-collector-sa
    namespace: openshift-logging
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: my-log-ca
  namespace: openshift-logging
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
---
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: my-log-forwarder
  namespace: openshift-logging
spec:
  managementState: Managed
  serviceAccount:
    name: my-log-collector-sa
  inputs:
    - name: my-hello-app-logs
      type: application
      application:
        includes:
          - namespace: observability-demo
  outputs:
    - name: my-lokistack-out
      type: lokiStack
      lokiStack:
        target:
          name: my-logging-loki
          namespace: openshift-logging
        authentication:
          token:
            from: serviceAccount
      tls:
        ca:
          configMapName: my-log-ca
          key: service-ca.crt
  pipelines:
    - name: my-app-to-loki
      inputRefs:
        - my-hello-app-logs
      outputRefs:
        - my-lokistack-out
---

# *********************************************************************************
# モニタリング
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: my-grafana
  labels:
    dashboards: my-grafana
  namespace: observability-demo
spec:
  config:
    log:
      mode: console
      level: warn
    security:
      admin_user: admin
      admin_password: admin
    auth:
      disable_login_form: 'true'
      disable_signout_menu: 'true'
    auth.anonymous:
      enabled: 'true'
      org_role: Admin
  deployment:
    spec:
      template:
        spec:
          containers:
            - ports:
                - protocol: TCP
                  name: grafana-http
                  containerPort: 3000
              name: grafana
  route:
    spec:
      tls:
        termination: edge
      to:
        weight: 100
        name: my-grafana-service
        kind: Service
---

# *********************************************************************************
# ログデータを読む
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-loki-reader
  namespace: observability-demo
---
apiVersion: v1
kind: Secret
metadata:
  name: my-loki-reader-token
  namespace: observability-demo
  annotations:
    kubernetes.io/service-account.name: my-loki-reader
type: kubernetes.io/service-account-token
---
#デモなので管理者権限とする
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: my-loki-reader-bind-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: my-loki-reader
    namespace: observability-demo
---

apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: my-loki-datasource
  namespace: observability-demo
spec:
  instanceSelector:
    matchLabels:
      dashboards: my-grafana
  valuesFrom:
    - targetPath: "secureJsonData.httpHeaderValue1"
      valueFrom:
        secretKeyRef:
          name: my-loki-reader-token
          key: token
  datasource:
    name: my-loki-application
    type: loki
    access: proxy
    url: https://my-logging-loki-gateway-http.openshift-logging.svc:8080/api/logs/v1/application/
    jsonData:
      httpMethod: GET
      timeInterval: 5s
      tlsSkipVerify: true
      httpHeaderName1: Authorization
      httpHeaderName2: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: "Bearer ${token}"
      httpHeaderValue2: "application"

# トレーシングを見る
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: my-tempo-datasource
  namespace: observability-demo
spec:
  instanceSelector:
    matchLabels:
      dashboards: my-grafana
  datasource:
    name: my-tempo
    type: tempo
    access: proxy
    url: http://tempo-hello-tempo-monolithic.observability-demo.svc.cluster.local:3200
---

# メトリクスを見る
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-prometheus-reader
  namespace: observability-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: my-prometheus-reader-bind-monitoring-view
subjects:
  - kind: ServiceAccount
    name: my-prometheus-reader
    namespace: observability-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
---
apiVersion: v1
kind: Secret
metadata:
  name: my-prometheus-reader-token
  namespace: observability-demo
  annotations:
    kubernetes.io/service-account.name: my-prometheus-reader
type: kubernetes.io/service-account-token
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: my-prometheus-datasource
  namespace: observability-demo
spec:
  instanceSelector:
    matchLabels:
      dashboards: my-grafana
  valuesFrom:
    - targetPath: "secureJsonData.httpHeaderValue1"
      valueFrom:
        secretKeyRef:
          name: my-prometheus-reader-token
          key: token
  datasource:
    name: my-prometheus-datasource
    type: prometheus
    access: proxy
    url: https://thanos-querier.openshift-monitoring.svc:9091
    jsonData:
      httpHeaderName1: Authorization
      tlsSkipVerify: true
      httpMethod: POST
      timeInterval: 15s
    secureJsonData:
      httpHeaderValue1: "Bearer ${token}"
---


