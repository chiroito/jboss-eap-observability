# *********************************************************************************
# OTel Collector
---
kind: OpenTelemetryCollector
apiVersion: opentelemetry.io/v1beta1
metadata:
  name: otel
  namespace: hello-app
spec:
  mode: deployment
  config:
    exporters:
      debug: {}
      otlp/tempo:
        endpoint: 'tempo-hello-tempo-monolithic.hello-app.svc.cluster.local:4317'
        tls:
          insecure: true
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    service:
      pipelines:
        traces:
          exporters:
            - otlp/tempo
          processors:
            - batch
          receivers:
            - otlp

# *********************************************************************************
# メトリクス
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: hello-app
  namespace: hello-app
  labels:
    app.kubernetes.io/name: hello-app
spec:
  namespaceSelector:
    matchNames:
      - hello-app
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-app
  podMetricsEndpoints:
    - port: management
      path: /metrics
      scheme: http
      interval: 15s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-config
  namespace: openshift-monitoring
data:
  config.yaml: |
    enableUserWorkload: true
# 開発者ダッシュボードには出ない（なぜ？
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-app
  namespace: openshift-config-managed
  labels:
    console.openshift.io/dashboard: "true" # このラベルが重要
data:
  hello-app-metrics.json: |
    {
      "title": "Hello App 運用ダッシュボード",
      "panels": [
        {
          "title": "HTTP リクエスト数",
          "type": "graph",
          "format": "time_series",
          "intervalFactor": 1,
          "targets": [
            { "expr": "jboss_undertow_request_count_total" }
          ]
        },
        {
          "title": "JVM GC時間",
          "type": "graph",
          "format": "time_series",
          "intervalFactor": 1,
          "legendFormat": "",
          "refId": "C",
          "targets": [
            { "expr": "base_gc_time_total_seconds" }
          ]
        },
        {
          "title": "JVM GC回数",
          "type": "graph",
          "targets": [
            { "expr": "base_gc_total" }
          ]
        }
      ]
    }   

---



# *********************************************************************************
# JFR
apiVersion: operator.cryostat.io/v1beta2
kind: Cryostat
metadata:
  name: cryostat-sample
  namespace: hello-app
spec:
  enableCertManager: false